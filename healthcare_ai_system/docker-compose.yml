version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/healthcare
      - SECRET_KEY=changeme
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: python:3.12-slim
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.headless true
    volumes:
      - ./:/app
    working_dir: /app/healthcare_ai_system
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  db_data:
    driver: local
